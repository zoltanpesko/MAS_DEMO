<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maximo Asset Viewer</title>
    <link rel="stylesheet" href="https://unpkg.com/carbon-components@10.58.0/css/carbon-components.min.css">
    <style>
        :root {
            --cds-interactive-01: #0f62fe;
            --cds-interactive-02: #393939;
            --cds-ui-background: #ffffff;
            --cds-ui-01: #f4f4f4;
            --cds-ui-02: #ffffff;
            --cds-text-01: #161616;
            --cds-text-02: #525252;
            --cds-text-03: #a8a8a8;
            --cds-field-01: #f4f4f4;
            --cds-support-01: #da1e28;
            --cds-support-02: #24a148;
            --cds-support-04: #0f62fe;
            --cds-layer-01: #f4f4f4;
            --cds-layer-02: #ffffff;
            --cds-border-subtle-00: #e0e0e0;
            --cds-border-interactive: #0f62fe;
            --cds-spacing-03: 0.5rem;
            --cds-spacing-05: 1rem;
            --cds-spacing-06: 1.5rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--cds-ui-background);
            color: var(--cds-text-01);
            line-height: 1.5;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 1rem;
            color: var(--cds-text-01);
        }

        h2 {
            font-size: 1.75rem;
            font-weight: 400;
            margin-bottom: 1rem;
            color: var(--cds-text-01);
        }

        h3 {
            font-size: 1.25rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
            color: var(--cds-text-01);
        }

        .info-card {
            background: var(--cds-layer-02);
            padding: var(--cds-spacing-06);
            margin-bottom: var(--cds-spacing-05);
            outline: 1px solid var(--cds-border-subtle-00);
        }

        .config-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--cds-spacing-05);
            margin-bottom: var(--cds-spacing-05);
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--cds-text-02);
        }

        input[type="text"],
        input[type="password"] {
            padding: 0.75rem;
            border: none;
            border-bottom: 1px solid var(--cds-text-03);
            background: var(--cds-field-01);
            font-size: 0.875rem;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-bottom: 2px solid var(--cds-interactive-01);
        }

        .button-primary {
            background: var(--cds-interactive-01);
            color: white;
            border: none;
            padding: 0.875rem 1rem;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            min-height: 48px;
        }

        .button-primary:hover {
            background: #0353e9;
        }

        .button-secondary {
            background: var(--cds-interactive-02);
            color: white;
            border: none;
            padding: 0.875rem 1rem;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .button-secondary:hover {
            background: #4c4c4c;
        }

        .asset-table {
            width: 100%;
            background: var(--cds-layer-02);
            border-collapse: collapse;
            margin-top: var(--cds-spacing-05);
        }

        .asset-table th {
            background: var(--cds-layer-01);
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid var(--cds-border-subtle-00);
            font-size: 0.875rem;
        }

        .asset-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--cds-border-subtle-00);
            font-size: 0.875rem;
        }

        .asset-table tr:hover {
            background: var(--cds-layer-01);
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-active {
            background: #d0e2ff;
            color: #0043ce;
        }

        .status-inactive {
            background: #f4f4f4;
            color: #525252;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--cds-spacing-05);
            margin-bottom: var(--cds-spacing-05);
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .info-item strong {
            font-size: 0.875rem;
            color: var(--cds-text-02);
        }

        .info-item span {
            font-size: 1rem;
            color: var(--cds-text-01);
        }

        .data-source-badge {
            margin-top: var(--cds-spacing-05);
            padding: var(--cds-spacing-03);
            background: var(--cds-layer-01);
            border-left: 3px solid var(--cds-support-02);
            font-size: 0.875rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--cds-text-02);
        }

        .error {
            color: var(--cds-support-01);
            padding: 1rem;
            background: #fff1f1;
            border-left: 3px solid var(--cds-support-01);
        }

        .success {
            color: var(--cds-support-02);
            padding: 1rem;
            background: #defbe6;
            border-left: 3px solid var(--cds-support-02);
        }

        details {
            margin-top: var(--cds-spacing-05);
            cursor: pointer;
        }

        summary {
            font-weight: 600;
            padding: 0.5rem;
            background: var(--cds-layer-01);
            user-select: none;
        }

        pre {
            background: var(--cds-layer-01);
            padding: 1rem;
            overflow-x: auto;
            font-size: 0.75rem;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏭 Maximo Asset Viewer</h1>
        <p style="color: var(--cds-text-02); margin-bottom: 2rem;">View and manage assets from Maximo Application Suite</p>

        <!-- API Configuration -->
        <div class="info-card">
            <h3>🔧 API Configuration</h3>
            <div class="config-section">
                <div class="form-group">
                    <label for="serverUrl">MAS Server URL</label>
                    <input type="text" id="serverUrl" placeholder="https://your-maximo-instance.com">
                </div>
                <div class="form-group">
                    <label for="apiKey">API Key</label>
                    <input type="password" id="apiKey" placeholder="Your API Key">
                </div>
            </div>
            <button class="button-primary" onclick="saveConfig()">💾 Save Configuration</button>
        </div>

        <!-- Asset Viewer -->
        <div class="info-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--cds-spacing-05);">
                <h3 style="margin: 0;">📦 Assets (First 10)</h3>
                <button class="button-secondary" onclick="loadAssets()" style="min-height: 40px; padding: 0.5rem 1rem;">
                    🔄 Load Assets
                </button>
            </div>
            <div id="assetStatus"></div>
            <div id="assetData"></div>
        </div>
    </div>

    <script>
        // Load saved configuration
        function loadConfig() {
            const serverUrl = localStorage.getItem('mas_server_url') || '';
            const apiKey = localStorage.getItem('mas_api_key') || '';
            
            document.getElementById('serverUrl').value = serverUrl;
            document.getElementById('apiKey').value = apiKey;
        }

        // Save configuration
        function saveConfig() {
            const serverUrl = document.getElementById('serverUrl').value;
            const apiKey = document.getElementById('apiKey').value;
            
            localStorage.setItem('mas_server_url', serverUrl);
            localStorage.setItem('mas_api_key', apiKey);
            
            document.getElementById('assetStatus').innerHTML = '<div class="success">✅ Configuration saved successfully!</div>';
            setTimeout(() => {
                document.getElementById('assetStatus').innerHTML = '';
            }, 3000);
        }

        // Get configuration
        function getConfig() {
            return {
                serverUrl: localStorage.getItem('mas_server_url') || '',
                apiKey: localStorage.getItem('mas_api_key') || ''
            };
        }

        // Load assets from Maximo
        async function loadAssets() {
            const config = getConfig();
            if (!config.serverUrl || !config.apiKey) {
                document.getElementById('assetStatus').innerHTML = '<div class="error">⚠️ Please configure API settings first</div>';
                return;
            }

            document.getElementById('assetStatus').innerHTML = '<div class="loading">⏳ Loading assets...</div>';
            document.getElementById('assetData').innerHTML = '';

            try {
                // Call backend proxy which will fetch from Maximo
                const response = await fetch('/api/assets', {
                    method: 'GET',
                    headers: {
                        'x-mas-api-key': config.apiKey,
                        'x-mas-server-url': config.serverUrl,
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();
                
                if (result.success && result.data && result.data.member && result.data.member.length > 0) {
                    displayAssets(result.data.member, result.data);
                    document.getElementById('assetStatus').innerHTML = `<div class="success">✅ Successfully loaded ${result.data.member.length} assets from ${result.source === 'maximo' ? 'Maximo' : 'Mock Data'}</div>`;
                } else {
                    document.getElementById('assetStatus').innerHTML = '<div class="error">⚠️ No assets found</div>';
                }
            } catch (error) {
                console.error('Error loading assets:', error);
                document.getElementById('assetStatus').innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }

        // Display assets in a table
        function displayAssets(assets, fullData) {
            const lastRefreshed = new Date().toLocaleString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });

            let html = `
                <div style="margin-bottom: var(--cds-spacing-05); padding: var(--cds-spacing-03); background: var(--cds-layer-01); border-left: 3px solid var(--cds-border-interactive); font-size: 0.875rem; color: var(--cds-text-02);">
                    🕒 Last Refreshed: ${lastRefreshed}
                </div>
                <table class="asset-table">
                    <thead>
                        <tr>
                            <th>Asset Number</th>
                            <th>Description</th>
                            <th>Status</th>
                            <th>Site</th>
                            <th>Location</th>
                            <th>Type</th>
                            <th>Manufacturer</th>
                            <th>Serial Number</th>
                            <th>Install Date</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            assets.forEach(asset => {
                const statusClass = asset.status === 'OPERATING' ? 'status-active' : 'status-inactive';
                const installDate = asset.installdate ? new Date(asset.installdate).toLocaleDateString() : 'N/A';
                
                html += `
                    <tr>
                        <td><strong>${asset.assetnum || 'N/A'}</strong></td>
                        <td>${asset.description || 'N/A'}</td>
                        <td><span class="status-badge ${statusClass}">${asset.status || 'N/A'}</span></td>
                        <td>${asset.siteid || 'N/A'}</td>
                        <td>${asset.location || 'N/A'}</td>
                        <td>${asset.assettype || 'N/A'}</td>
                        <td>${asset.manufacturer || 'N/A'}</td>
                        <td>${asset.serialnum || 'N/A'}</td>
                        <td>${installDate}</td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
                <details style="margin-top: var(--cds-spacing-05);">
                    <summary><strong>View Full JSON Response</strong></summary>
                    <pre>${JSON.stringify(fullData, null, 2)}</pre>
                </details>
            `;

            document.getElementById('assetData').innerHTML = html;
        }

        // Load configuration on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadConfig();
        });
    </script>
</body>
</html>
