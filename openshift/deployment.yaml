apiVersion: apps/v1
kind: Deployment
metadata:
  name: mas-vendor-page
  labels:
    app: mas-vendor-page
    app.kubernetes.io/name: mas-vendor-page
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mas-vendor-page
  template:
    metadata:
      labels:
        app: mas-vendor-page
    spec:
      containers:
      - name: mas-vendor-page
        image: image-registry.openshift-image-registry.svc:5000/mas-demo/mas-vendor-page:latest
        ports:
        - containerPort: 3000
          protocol: TCP
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: HOSTNAME
          value: "0.0.0.0"
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        imagePullPolicy: Always
      restartPolicy: Always

